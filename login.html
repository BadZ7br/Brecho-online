<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>CORRE BRECHÓ | ENTRAR NO CORRE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Hanken+Grotesk:wght@400;700&amp;family=Space+Mono:wght@400;700&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Configuração do Tailwind compartilhada entre todas as páginas -->
    <script src="assets/js/tailwind-config.js"></script>
</head>

<body
    class="bg-surface text-on-surface font-body-lg text-body-lg min-h-screen overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
    <div class="grain-overlay">

    </div>
    <!-- Main Container: Split Screen Layout -->
    <main class="flex min-h-screen flex-col md:flex-row relative">
        <!-- Botão Voltar para Home (adicionado) -->
        <a class="absolute top-6 left-6 flex items-center gap-1 font-label-mono text-label-mono uppercase text-on-surface-variant hover:text-primary transition-colors z-20"
            href="index.html">
            <span class="material-symbols-outlined">arrow_back</span>
            Voltar
        </a>
        <!-- Left Side: Visual/Branding (The "Wheatpaste" editorial style) -->
        <section
            class="hidden md:flex md:w-1/2 bg-surface-container relative overflow-hidden items-center justify-center concrete-texture">
            <!-- Background Image with Filter -->
            <div class="absolute inset-0 z-0 opacity-40 mix-blend-luminosity">
                <img src="img/imgfundo.png"
                    alt="A gritty urban scene of a Brazilian alleyway at dusk, featuring dark concrete walls covered in vibrant graffiti, wheatpaste posters for a fashion brand, and low-key cinematic lighting. The atmosphere is raw and industrial with high-contrast shadows and a neon green atmospheric glow reflecting off puddles."
                    class="w-full h-full bg-cover bg-center">
            </div>
            <!-- Kinetic Elements / Stickers -->
            <div
                class="absolute bottom-20 right-10 sticker-rotate-2 z-20 bg-secondary-container text-on-secondary-container px-6 py-2 font-headline-lg text-headline-lg uppercase border-2 border-black">
                STREETWEAR
            </div>
            <!-- Center Brand Anchor -->
            <div class="relative z-10 text-center px-margin-desktop">
                <a href="index.html">
                    <img src="img/screen.png" alt="CORRE BRECHÓ" class="h-12 w-auto object-contain">
                </a>
                <p
                    class="font-label-mono text-label-mono text-primary-fixed-dim uppercase tracking-widest bg-surface/80 inline-block px-4 py-1">
                    Cultura de rua, com peças selecionadas
                </p>
                <div class="mt-12 max-w-sm mx-auto">
                    <p
                        class="font-body-lg text-body-lg italic opacity-80 border-l-4 border-primary-container pl-6 text-left">
                        "As ruas podem definir seu estilo,vem pro Corre"
                    </p>
                </div>
            </div>
            <!-- Spray Paint Detail (Absolute Decor) -->
            <div
                class="absolute bottom-[-50px] left-[-50px] w-64 h-64 bg-primary-container rounded-full blur-[120px] opacity-20">

            </div>
        </section>
        <!-- Right Side: Auth Forms -->
        <section
            class="flex-1 flex flex-col justify-center items-center px-margin-mobile md:px-margin-desktop bg-surface relative z-10">
            <!-- Drop #042 Sticker (moved from left section) -->
            <div
                class="absolute top-4 right-20 sticker-rotate-1 z-20 bg-primary-container text-on-primary-container px-4 py-2 font-label-mono text-label-mono uppercase shadow-md animate-drift">
                Drop #042
            </div>
            <!-- Mobile Header Logo (Visible only on small screens) -->
            <div class="md:hidden mb-12 text-center">
                <a href="index.html">
                    <img src="img/screen.png" alt="CORRE BRECHÓ" class="h-12 w-auto object-contain">
                </a>
                <p class="font-label-mono text-label-mono text-primary-container uppercase">Entre para o corre</p>
            </div>
            <!-- Auth Card / Container -->
            <div class="w-full max-w-md bg-surface-container-high p-8 md:p-12 border-2 border-outline-variant relative">
                <!-- Toggle Tabs (Simulated) -->
                <div class="flex gap-4 mb-10 border-b border-outline-variant pb-2">
                    <button
                        class="font-label-mono text-label-mono uppercase transition-colors text-primary border-b-2 border-primary-container pb-2"
                        id="tab-login" onclick="toggleAuth('login')">
                        ENTRAR NO CORRE
                    </button>
                    <button
                        class="font-label-mono text-label-mono uppercase transition-colors text-on-surface-variant hover:text-primary pb-2"
                        id="tab-register" onclick="toggleAuth('register')">
                        CRIAR CONTA
                    </button>
                </div>
                <!-- Login Form -->
                <form class="space-y-6" id="form-login">
                    <div>
                        <label
                            class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Email</label>
                        <input id="login-email"
                            class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all placeholder:opacity-30"
                            placeholder="seu@corre.com" type="email" required>
                    </div>
                    <div>
                        <div class="flex justify-between mb-2">
                            <label
                                class="font-label-mono text-label-mono uppercase text-on-surface-variant block">Senha</label>
                            <a class="font-label-mono text-[10px] uppercase text-primary-container hover:underline"
                                href="#">Esqueci a senha</a>
                        </div>
                        <input id="login-password"
                            class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all placeholder:opacity-30"
                            placeholder="••••••••" type="password" required>
                    </div>
                    <div class="pt-4">
                        <button
                            class="w-full bg-primary-container text-on-primary-container font-headline-lg text-[24px] py-4 uppercase hover:bg-secondary-container hover:text-on-secondary-container active:scale-95 transition-all duration-200 flex items-center justify-center gap-2"
                            type="submit">
                            <span class="">ENTRAR</span>
                            <span class="material-symbols-outlined">bolt</span>
                        </button>
                    </div>
                </form>
                <!-- Registration Form (Hidden by default) -->
                <form class="space-y-6 hidden" id="form-register">
                    <div class="flex gap-3 mb-6">
                        <button type="button" id="register-user-btn"
                            class="register-type-btn flex-1 rounded-md border border-outline-variant bg-surface-container-lowest py-3 text-sm uppercase text-primary transition-colors">
                            Usuário
                        </button>
                        <button type="button" id="register-store-btn"
                            class="register-type-btn flex-1 rounded-md border border-outline-variant bg-surface-container-lowest py-3 text-sm uppercase text-on-surface-variant transition-colors">
                            Brechó
                        </button>
                    </div>
                    <div id="register-user-fields" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Nome</label>
                                <input id="register-user-name"
                                    class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                    type="text" placeholder="Seu nome completo" required>
                            </div>
                            <div>
                                <label
                                    class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Tag/Nick</label>
                                <input id="register-user-nick"
                                    class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                    type="text" placeholder="Seu apelido de usuário" required>
                            </div>
                        </div>
                    </div>
                    <div id="register-store-fields" class="space-y-6 hidden">
                        <div>
                            <label
                                class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Nome do Brechó</label>
                            <input id="register-store-name"
                                class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                type="text" placeholder="Nome do seu brechó" required>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">CNPJ</label>
                                <input id="register-store-cnpj"
                                    class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                    type="text" placeholder="00.000.000/0000-00">
                            </div>
                            <div>
                                <label
                                    class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">WhatsApp</label>
                                <input id="register-store-whatsapp"
                                    class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                    type="tel" placeholder="(00) 00000-0000">
                            </div>
                        </div>
                        <div>
                            <label
                                class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Cidade / Bairro</label>
                            <input id="register-store-location"
                                class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                type="text" placeholder="Onde seu brechó opera">
                        </div>
                        <div>
                            <label
                                class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Descrição do Brechó</label>
                            <textarea id="register-store-description" rows="3"
                                class="w-full resize-none bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                placeholder="Conte um pouco sobre o seu brechó e o que você vende"></textarea>
                        </div>
                    </div>
                    <div>
                        <label
                            class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Email</label>
                        <input id="register-email"
                            class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                            type="email" placeholder="seu@corre.com" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label
                                class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Senha</label>
                            <input id="register-password"
                                class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                type="password" placeholder="••••••••" required>
                        </div>
                        <div>
                            <label
                                class="font-label-mono text-label-mono uppercase text-on-surface-variant block mb-2">Confirmar senha</label>
                            <input id="register-confirm-password"
                                class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant py-4 px-2 font-body-lg text-primary input-focus-accent transition-all"
                                type="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button
                            class="w-full bg-primary-container text-on-primary-container font-headline-lg text-[24px] py-4 uppercase hover:bg-secondary-container hover:text-on-secondary-container active:scale-95 transition-all duration-200"
                            type="submit">
                            CRIAR CONTA
                        </button>
                    </div>
                </form>
                <!-- Social Auth -->
                <!-- Footer Text -->
                <p class="mt-10 text-center font-body-sm text-body-sm text-on-surface-variant">
                    Ao entrar, você concorda com nossos <br>
                    <a class="underline hover:text-primary transition-colors" href="#">Termos de Serviço</a>
                    e
                    <a class="underline hover:text-primary transition-colors" href="#">Políticas de
                        Uso</a>.
                </p>
                <!-- Corner Accent -->
                <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-primary-container"></div>
            </div>
            <!-- Background Floating Text (Atmospheric) -->
        </section>
    </main>
    <!-- Simple Footer for Legal/Copyright -->
    <footer
        class="bg-surface-container-lowest py-8 px-margin-mobile md:px-margin-desktop border-t-4 border-primary flex flex-col md:flex-row justify-between items-center gap-4">
        <span class="font-label-mono text-label-mono text-on-surface-variant">
            <div class="flex items-center gap-2"><span class="">© 2026</span><img src="img/screen.png"
                    alt="CORRE BRECHÓ" class="h-16 w-auto object-contain mb-4"><span class="">- CULTURA DE RUA</span>
            </div>
        </span>
        <div class="flex gap-6 font-label-mono text-label-mono uppercase">
            <a class="text-on-surface-variant hover:text-primary transition-colors"
                href="newsletter.html">Newsletter</a>
            <a class="text-on-surface-variant hover:text-primary transition-colors" href="#">Suporte</a>
        </div>
    </footer>
    <script>
        function toggleAuth(type) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.classList.add('text-primary', 'border-b-2', 'border-primary-container');
                tabLogin.classList.remove('text-on-surface-variant');
                tabRegister.classList.remove('text-primary', 'border-b-2', 'border-primary-container');
                tabRegister.classList.add('text-on-surface-variant');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.classList.add('text-primary', 'border-b-2', 'border-primary-container');
                tabRegister.classList.remove('text-on-surface-variant');
                tabLogin.classList.remove('text-primary', 'border-b-2', 'border-primary-container');
                tabLogin.classList.add('text-on-surface-variant');
            }
        }

        function toggleRegisterType(type) {
            const userBtn = document.getElementById('register-user-btn');
            const storeBtn = document.getElementById('register-store-btn');
            const userFields = document.getElementById('register-user-fields');
            const storeFields = document.getElementById('register-store-fields');

            if (!userFields || !storeFields) return;

            if (type === 'store') {
                userFields.classList.add('hidden');
                storeFields.classList.remove('hidden');
                userBtn?.classList.remove('text-primary');
                userBtn?.classList.add('text-on-surface-variant');
                storeBtn?.classList.remove('text-on-surface-variant');
                storeBtn?.classList.add('text-primary');
            } else {
                userFields.classList.remove('hidden');
                storeFields.classList.add('hidden');
                userBtn?.classList.remove('text-on-surface-variant');
                userBtn?.classList.add('text-primary');
                storeBtn?.classList.remove('text-primary');
                storeBtn?.classList.add('text-on-surface-variant');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const userBtn = document.getElementById('register-user-btn');
            const storeBtn = document.getElementById('register-store-btn');

            if (userBtn) userBtn.addEventListener('click', () => toggleRegisterType('user'));
            if (storeBtn) storeBtn.addEventListener('click', () => toggleRegisterType('store'));
        });
    </script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
